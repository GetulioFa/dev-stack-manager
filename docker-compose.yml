services:

  # ── Backend: .NET 10 API ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsm-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Data Source=/data/devstackmanager.db"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
      JwtSettings__Issuer: "DevStackManager"
      JwtSettings__Audience: "DevStackManager"
      JwtSettings__ExpiresInHours: "2"
      # CORS is handled by Nginx internally — no browser origin needed
      Cors__AllowedOrigins__0: "http://frontend"
    volumes:
      - db-data:/data        # persistent SQLite file
    networks:
      - dsm-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    # Backend is not exposed directly — Nginx proxies /api/* to it
    expose:
      - "8080"

  # ── Frontend: Angular 19 + Nginx ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dsm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dsm-network

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  db-data:
    name: dsm-database

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  dsm-network:
    name: dsm-network
    driver: bridge
